        function getScoreColor(score, max) {
            const percent = (score / max) * 100;
            if (percent >= 90) return { bg: 'bg-emerald-100', text: 'text-emerald-700', ring: 'ring-emerald-500' };
            if (percent >= 70) return { bg: 'bg-blue-100', text: 'text-blue-700', ring: 'ring-blue-500' };
            if (percent >= 50) return { bg: 'bg-amber-100', text: 'text-amber-700', ring: 'ring-amber-500' };
            return { bg: 'bg-red-100', text: 'text-red-700', ring: 'ring-red-500' };
        }

            return ((note20 / 20) * 5 + 1).toFixed(1);

            if (note >= 18) return 'from-emerald-500 to-teal-600';
            if (note >= 16) return 'from-blue-500 to-indigo-600';
            if (note >= 14) return 'from-amber-500 to-orange-600';
            return 'from-red-500 to-rose-600';
        }

            if (note >= 18) return 'bg-emerald-500/80 hover:bg-emerald-500';
            if (note >= 16) return 'bg-blue-500/80 hover:bg-blue-500';
            if (note >= 14) return 'bg-amber-500/80 hover:bg-amber-500';
            return 'bg-red-500/80 hover:bg-red-500';
        }

                                <div>
                                    <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                        <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                        Évaluation détaillée
                                    </h3>
                                    <div class="grid grid-cols-2 lg:grid-cols-6 gap-3">
                                        ${[
                                            { label: 'Structure', score: eleve.structure, max: 4, icon: '🏗️' },
                                            { label: 'Responsive', score: eleve.responsive, max: 4, icon: '📱' },
                                            { label: 'Design', score: eleve.design, max: 4, icon: '🎨' },
                                            { label: 'Qualité', score: eleve.qualite, max: 3, icon: '✨' },
                                            { label: 'Perf.', score: eleve.performance, max: 3, icon: '⚡' },
                                            { label: 'Bonus', score: eleve.bonus, max: 2, icon: '🎁' }
                                        ].map(item => {
                                            const colors = getScoreColor(item.score, item.max);
                                            return `
                                                <div class="${colors.bg} rounded-xl p-4 text-center transition-transform hover:scale-105">
                                                    <div class="text-2xl mb-1">${item.icon}</div>
                                                    <div class="text-xs text-slate-600 font-medium mb-1">${item.label}</div>
                                                    <div class="text-xl font-bold ${colors.text}">${item.score}<span class="text-sm font-normal text-slate-400">/${item.max}</span></div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>

                                <!-- Feedback -->
                                <div class="grid lg:grid-cols-2 gap-6">
                                    <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-5">
                                        <h4 class="font-bold text-emerald-800 mb-3 flex items-center gap-2">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                            Points positifs
                                        </h4>
                                        <ul class="space-y-2">
                                            ${eleve.points_positifs.map(p => `
                                                <li class="flex items-start gap-2 text-sm text-emerald-700">
                                                    <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                                    ${p}
                                                </li>
                                            `).join('')}
                                        </ul>
                                    </div>
                                    <div class="bg-amber-50 border border-amber-200 rounded-2xl p-5">
                                        <h4 class="font-bold text-amber-800 mb-3 flex items-center gap-2">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                            À améliorer
                                        </h4>
                                        <ul class="space-y-2">
                                            ${eleve.points_negatifs.map(p => `
                                                <li class="flex items-start gap-2 text-sm text-amber-700">
                                                    <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                                                    ${p}
                                                </li>
                                            `).join('')}
                                        </ul>
                                    </div>
                                </div>

                                <!-- Links -->
                                <div class="flex flex-wrap gap-3 pt-4 border-t border-slate-200">
                                    <a href="${siteUrl}" target="_blank" class="inline-flex items-center gap-2 bg-primary hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-medium transition-all hover:shadow-lg hover:-translate-y-0.5">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                                        Voir le site
                                    </a>
                                    <a href="${depotUrl}" target="_blank" class="inline-flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white px-5 py-3 rounded-xl font-medium transition-all hover:shadow-lg hover:-translate-y-0.5">
                                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"></path></svg>
                                        Dépôt GitHub
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(slide);

                // Thumbnail
                const thumb = document.createElement('button');
                thumb.className = `${getThumbStyle(eleve.note)} ${index === 0 ? 'ring-2 ring-white ring-offset-2 ring-offset-transparent' : ''} text-white w-12 h-12 rounded-xl font-bold text-sm transition-all hover:scale-110 flex items-center justify-center`;
                thumb.textContent = eleve.nom.split(' ')[0].substring(0, 3);
                thumb.title = `${eleve.nom} - ${eleve.note}/20`;
                thumb.onclick = () => goToSlide(index);
                thumbNav.appendChild(thumb);
            });

            document.getElementById('totalSlides').textContent = eleves.length;
        }

        function updateSlide() {
            const slides = document.querySelectorAll('.slide');
            const thumbs = document.querySelectorAll('#thumbnailNav button');

            slides.forEach((slide, i) => {
                if (i === currentIndex) {
                    slide.classList.remove('hidden');
                    slide.querySelector('.slide-enter')?.classList.remove('slide-enter');
                    void slide.offsetWidth;
                    slide.querySelector('div')?.classList.add('slide-enter');
                } else {
                    slide.classList.add('hidden');
                }
            });

            thumbs.forEach((thumb, i) => {
                if (i === currentIndex) {
                    thumb.classList.add('ring-2', 'ring-white', 'ring-offset-2');
                } else {
                    thumb.classList.remove('ring-2', 'ring-white', 'ring-offset-2');
                }
            });

            document.getElementById('currentSlide').textContent = currentIndex + 1;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === eleves.length - 1;
        }

        function changeSlide(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= eleves.length) currentIndex = eleves.length - 1;
            updateSlide();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlide();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        // Touch swipe support
        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) changeSlide(diff > 0 ? 1 : -1);
        });

        // Initialize
        generateSlides();
    </script>
</body>
</html>
